app = "sync-claude-usage"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3030"
  NODE_ENV = "production"

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "sqlite_data"
  destination = "/data"
