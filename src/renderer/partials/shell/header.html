<div class="header">

      <div class="logo-dot" id="status-dot"></div>
      <span class="app-title">Claude Usage</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn sync-cloud-btn" id="btn-cloud-sync" style="display:none" title="">

      <button class="icon-btn" id="btn-server-status" title="Server status" style="display:none">

      <button class="icon-btn" id="btn-online-users" title="Online users" style="display:none">

        <button id="smart-indicator" class="smart-indicator hidden" data-i18n-title="smartPlan.openDetails">
          <span class="smart-indicator-dot"></span>

      <button class="icon-btn" id="btn-update-header" data-i18n-title="headerCheckUpdate">🔄</button>
