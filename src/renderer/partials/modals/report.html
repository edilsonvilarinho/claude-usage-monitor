<div id="report-modal" class="modal-overlay hidden">
  <div class="modal-box report-modal-box">
    <div class="day-detail-header">
      <span class="day-detail-title-text" data-i18n="reportTitle">Relatório de Uso</span>
      <button id="btn-close-report" class="day-detail-close-btn">✕</button>
    </div>
    <div class="report-chart-wrap">
      <canvas id="report-chart"></canvas>
    </div>
    <div id="report-stats" class="report-stats"></div>
    <div id="report-windows" class="report-windows"></div>
    <div id="report-analytics" class="report-analytics"></div>
    <div id="report-saturation" class="report-saturation"></div>
    <div id="report-heatmap" class="report-heatmap"></div>
    <div id="report-trend" class="report-trend"></div>
    <div class="report-metrics-row">
      <div id="report-forecast" class="report-forecast"></div>
      <div id="report-streak" class="report-streak"></div>
    </div>
    <div id="report-hourly" class="report-hourly"></div>
    <div class="report-metrics-row">
      <div id="report-risk-days" class="report-risk-days"></div>
      <div id="report-excess" class="report-excess"></div>
    </div>
