<div id="cli-sessions-modal" class="modal-overlay hidden">
  <div class="modal-box cli-sessions-box">
    <div class="cli-sessions-header">
      <span class="cli-sessions-title" data-i18n="cliSessionsTitle">Sessões CLI</span>
      <div class="cli-sessions-header-actions">
        <button id="cli-sessions-refresh" class="cli-refresh-btn" title="Atualizar lista">↻</button>
        <button id="cli-sessions-close" class="icon-btn">✕</button>
      </div>
    </div>
    <div id="cli-sessions-list" class="cli-sessions-list"></div>
    <div id="cli-sessions-detail" class="cli-sessions-detail hidden"></div>
    <div id="cli-sessions-empty" class="cli-sessions-empty hidden" data-i18n="cliSessionsEmpty">Nenhuma sessão CLI encontrada.</div>
  </div>
</div>
