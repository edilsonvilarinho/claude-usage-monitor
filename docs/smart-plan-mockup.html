<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Plan Mockup</title>
  <style>
    /* ============================================
       CORES (edite aqui!)
       ============================================ */
    :root {
      --bg: #1e1e2e;
      --surface: #2a2a3e;
      --border: #3a3a5e;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --accent: #6366f1;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --purple: #a855f7;
    }

    /* ============================================
       ESTILOS DO MODAL - edite aqui!
       ============================================ */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* --- Modal Overlay --- */
    .modal-overlay {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- Modal Box --- */
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      max-width: 340px;
      width: 100%;
    }

    /* --- Header do Modal --- */
    .day-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .day-detail-title-text {
      font-size: 14px;
      font-weight: 600;
    }

    .day-detail-close-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .day-detail-close-btn:hover {
      color: var(--text-primary);
    }

    /* ============================================
       SP-VERDICT - edite aqui!
       ============================================ */
    .sp-verdict {
      padding: 10px 12px;
      border-radius: 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* Cores do status - descomente para testar */
    /* .sp-verdict.status-green { background: var(--green); color: #000; } */
    /* .sp-verdict.status-yellow { background: var(--yellow); color: #000; } */
    /* .sp-verdict.status-red { background: var(--red); color: #fff; } */
    /* .sp-verdict.status-purple { background: var(--purple); color: #fff; } */

    /* Atual: */
    .sp-verdict {
      background: var(--green);
      color: #000;
    }

    /* ============================================
       SP-DONUT - edite aqui!
       ============================================ */
    .sp-donut-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 8px;
    }

    .sp-donut-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .sp-donut-wrap circle {
      fill: none;
      stroke-width: 8;
    }

    .sp-donut-wrap circle.bg {
      stroke: var(--border);
    }

    .sp-donut-wrap circle.progress {
      stroke: var(--green);
      stroke-linecap: round;
      /* stroke-dasharray: 170 251;  <- EDITE ESTE VALOR para mudar % */
    }

    .sp-donut-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      font-weight: 700;
    }

    .sp-donut-subtitle {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    /* ============================================
       SP-TIMELINE - edite aqui!
       ============================================ */
    .sp-timeline {
      margin-top: 16px;
    }

    .sp-timeline-title {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    /* --- Track principal --- */
    .sp-timeline-track {
      position: relative;
      height: 80px; /* MAIOR para caber as horas */
      background: #1a1a2e;
      border-radius: 8px;
      overflow: visible;
      border: 1px solid var(--border);
    }

    /* --- Fundo 24h com divisores --- */
    .sp-full-day {
      position: absolute;
      left: 0;
      width: 100%;
      height: 40px;
      top: 0;
      background: linear-gradient(90deg, 
        #252535 0%, #252535 12.5%,
        #2a2a3a 12.5%, #2a2a3a 25%,
        #252535 25%, #252535 37.5%,
        #2a2a3a 37.5%, #2a2a3a 50%,
        #252535 50%, #252535 62.5%,
        #2a2a3a 62.5%, #2a2a3a 75%,
        #252535 75%, #252535 87.5%,
        #2a2a3a 87.5%, #2a2a3a 100%
      );
    }

    /* --- Banda de trabalho (roxo) --- */
    .sp-work-shift {
      position: absolute;
      left: 0;
      width: 100%;
      height: 40px;
      top: 0;
      background: var(--purple);
      opacity: 0.3;
    }

    /* --- Banda de intervalo (amarelo) --- */
    .sp-break {
      position: absolute;
      left: 0;
      width: 100%;
      height: 40px;
      top: 0;
      background: var(--yellow);
      opacity: 0;
    }

    /* --- Divisores de hora --- */
    .sp-hour-markers {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 40px;
    }

    .sp-hour-marker {
      position: absolute;
      top: 0;
      height: 100%;
      width: 1px;
      background: var(--border);
    }

    .sp-hour-marker::after {
      content: attr(data-hour);
      position: absolute;
      top: 8px;
      left: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* --- Ticks (marcadores de início/fim) --- */
    .sp-tick {
      position: absolute;
      width: 3px; /* EDITE para mudar grossura */
      height: 100%;
      background: var(--text-secondary);
    }

    #sp-work-start-tick { left: 9%; }
    #sp-work-end-tick { left: 84%; }

    /* --- Marcador atual (verde) estilo NOW --- */
    .sp-marker-now {
      position: absolute;
      width: 4px;
      height: 100%;
      background: var(--green);
      z-index: 10;
    }

    .sp-marker-now::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -5px;
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 10px solid var(--green);
    }

    .sp-marker-now .now-label {
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #000;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* --- Marcador atual FORA do expediente --- */
    .sp-marker-now.out-of-hours {
      background: var(--red);
    }

    .sp-marker-now.out-of-hours::before {
      border-top-color: var(--red);
    }

    .sp-marker-now.out-of-hours .now-label {
      background: var(--red);
      color: #fff;
    }

    /* --- Label horario atual (abaixo) --- */
    .now-time-label {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: bold;
      background: var(--green);
      color: #000;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .sp-marker-now.out-of-hours + .now-time-label,
    .sp-marker-now.out-of-hours ~ .now-time-label {
      background: var(--red);
      color: #fff;
    }

    /* Marker de reset */
    .sp-marker-reset {
      position: absolute;
      width: 3px;
      height: 60%;
      top: 20%;
      background: var(--text-secondary);
      border-radius: 2px;
    }

    /* --- Marcador de reset (diamante) --- */
    .sp-marker-reset {
      position: absolute;
      width: 10px; /* EDITE para mudar tamanho */
      height: 10px;
      background: var(--text-primary);
      transform: rotate(45deg);
      top: 50%;
      margin-top: -5px;
    }

    /* Labels das horas */
    .sp-timeline-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ============================================
       LEGENDA - edite aqui!
       ============================================ */
    .sp-legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
      font-size: 10px;
      color: var(--text-secondary);
    }

    .sp-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* --- Ícones da legenda --- */
    .sp-legend-now-icon {
      width: 12px;
      height: 3px;
      background: var(--green);
    }

    .sp-legend-break-icon {
      width: 12px;
      height: 3px;
      background: var(--yellow);
      opacity: 0.5;
    }

    .sp-legend-reset-icon {
      width: 8px;
      height: 8px;
      background: var(--text-primary);
      transform: rotate(45deg);
    }

    /* ============================================
       CONTROLES DE TESTE
       ============================================ */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--surface);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .controls h4 {
      margin: 0 0 12px 0;
      font-size: 12px;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: block;
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .control-group input,
    .control-group select {
      width: 100%;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

  </style>
</head>
<body>

  <!-- CONTROLES DE TESTE -->
  <div class="controls">
    <h4>🧪 Controles de Teste</h4>
    
    <div class="control-group">
      <label>Status:</label>
      <select id="status-select" onchange="updateStatus()">
        <option value="green">Verde (livre)</option>
        <option value="yellow">Amarelo (atenção)</option>
        <option value="red">Vermelho (bloqueio)</option>
        <option value="purple">Roxo (sync)</option>
      </select>
    </div>

    <div class="control-group">
      <label>Uso % (donut):</label>
      <input type="range" id="usage-slider" min="0" max="100" value="68" oninput="updateDonut()">
    </div>

    <div class="control-group">
      <label>Horario atual (%):</label>
      <input type="range" id="now-slider" min="0" max="100" value="50" oninput="updateNow()">
    </div>

    <div class="control-group">
      <label>Espessura timeline:</label>
      <input type="range" id="height-slider" min="16" max="64" value="32" oninput="updateHeight()">
    </div>

    <div class="control-group">
      <label>Espessura marcadores:</label>
      <input type="range" id="tick-slider" min="1" max="8" value="3" oninput="updateTicks()">
    </div>

    <div class="control-group">
      <label>Tamanho reset:</label>
      <input type="range" id="reset-slider" min="4" max="20" value="10" oninput="updateReset()">
    </div>

    <hr style="border-color: var(--border); margin: 12px 0;">

    <div class="control-group">
      <label>Início trabalho:</label>
      <input type="time" id="work-start-time" value="09:00" onchange="updateTimes()">
    </div>

    <div class="control-group">
      <label>Fim trabalho:</label>
      <input type="time" id="work-end-time" value="18:00" onchange="updateTimes()">
    </div>

    <div class="control-group">
      <label>Início intervalo:</label>
      <input type="time" id="break-start-time" value="12:00" onchange="updateTimes()">
    </div>

    <div class="control-group">
      <label>Fim intervalo:</label>
      <input type="time" id="break-end-time" value="14:00" onchange="updateTimes()">
    </div>

    <div class="control-group">
      <label>Agora (hora):</label>
      <input type="time" id="now-time" value="14:30" onchange="updateTimes()">
    </div>

    <div class="control-group">
      <label>Reset (hora):</label>
      <input type="time" id="reset-time" value="19:00" onchange="updateTimes()">
    </div>
  </div>

  <!-- MODAL DO SMART PLAN -->
  <div class="modal-overlay">
    <div class="modal-box smart-scheduler-box">
      
      <!-- Header -->
      <div class="day-detail-header">
        <span class="day-detail-title-text">Smart Plan</span>
        <button class="day-detail-close-btn">✕</button>
      </div>

      <!-- Verdict (status) -->
      <div id="sp-verdict-header" class="sp-verdict">
        <span id="sp-verdict-text">Caminho livre</span>
      </div>

      <!-- Donut -->
      <div class="sp-donut-wrap">
        <svg viewBox="0 0 100 100">
          <circle class="bg" cx="50" cy="50" r="40"></circle>
          <circle class="progress" id="donut-progress" cx="50" cy="50" r="40" stroke-dasharray="170 251"></circle>
        </svg>
        <div class="sp-donut-label"><span id="sp-donut-pct">68</span>%</div>
      </div>
      <div class="sp-donut-subtitle">Sessão (5h)</div>

      <!-- Timeline estilo exemplo 37.png -->
      <div class="sp-timeline">
        <div class="sp-timeline-title">Timeline do dia</div>
        
        <div class="sp-timeline-track" id="timeline-track">
          <!-- Banda de trabalho -->
          <div class="sp-work-shift"></div>
          
          <!-- Fundo 24h com marcas -->
          <div class="sp-full-day">
            <div class="sp-hour-markers" id="hour-markers"></div>
          </div>
          
          <!-- Marcador atual estilo "NOW" -->
          <div class="sp-marker-now" id="sp-now-marker">
            <span class="now-label">NOW</span>
          </div>
          
          <!-- Label do horario atual -->
          <div class="now-time-label" id="now-time-label">14:30</div>
          
          <!-- Marcador de reset -->
          <div class="sp-marker-reset" id="sp-reset-marker"></div>
        </div>
        
        <!-- Labels inferiores -->
        <div class="sp-timeline-labels" style="justify-content: space-between; padding: 0 4px;">
          <span style="font-size: 11px;">06:00</span>
          <span style="font-size: 11px;">09:00</span>
          <span style="font-size: 11px;">12:00</span>
          <span style="font-size: 11px;">15:00</span>
          <span style="font-size: 11px;">18:00</span>
          <span style="font-size: 11px;">21:00</span>
          <span style="font-size: 11px;">24:00</span>
        </div>
      </div>

      <!-- Legenda -->
      <div class="sp-legend">
        <span class="sp-legend-item">
          <span class="sp-legend-now-icon"></span>
          <span>Agora</span>
        </span>
        <span class="sp-legend-item">
          <span class="sp-legend-break-icon"></span>
          <span>Intervalo</span>
        </span>
        <span class="sp-legend-item">
          <span id="sp-legend-reset-icon" class="sp-legend-reset-icon"></span>
          <span>Reset</span>
        </span>
      </div>

    </div>
  </div>

  <script>
    // ============================================
    // SCRIPTS DE TESTE - EDITE SE PRECISA
    // ============================================

    const statusColors = {
      green: { bg: '#22c55e', text: '#000' },
      yellow: { bg: '#eab308', text: '#000' },
      red: { bg: '#ef4444', text: '#fff' },
      purple: { bg: '#a855f7', text: '#fff' }
    };

    const statusTexts = {
      green: 'Caminho livre',
      yellow: 'Cuidado com overhead',
      red: 'Bloqueio iminente',
      purple: 'Sincronização recomendada'
    };

    function updateStatus() {
      const select = document.getElementById('status-select');
      const color = statusColors[select.value];
      const text = statusTexts[select.value];
      
      const verdict = document.getElementById('sp-verdict-header');
      verdict.style.background = color.bg;
      verdict.style.color = color.text;
      
      document.getElementById('sp-verdict-text').textContent = text;
      
      // Atualiza donut também
      const donut = document.querySelector('#donut-progress');
      donut.style.stroke = select.value === 'green' ? '#22c55e' : 
                      select.value === 'yellow' ? '#eab308' : 
                      select.value === 'red' ? '#ef4444' : '#a855f7';
    }

    function updateDonut() {
      const slider = document.getElementById('usage-slider');
      const value = slider.value;
      
      // Calcula stroke-dasharray
      const circumference = 2 * Math.PI * 40; // ~251
      const filled = (value / 100) * circumference;
      const empty = circumference - filled;
      
      const donut = document.getElementById('donut-progress');
      donut.style.strokeDasharray = `${filled} ${empty}`;
      
      document.getElementById('sp-donut-pct').textContent = value;
    }

    function updateNow() {
      const slider = document.getElementById('now-slider');
      const marker = document.getElementById('sp-now-marker');
      marker.style.left = slider.value + '%';
    }

    function updateHeight() {
      const slider = document.getElementById('height-slider');
      const track = document.getElementById('timeline-track');
      track.style.height = slider.value + 'px';
    }

    function updateTicks() {
      const slider = document.getElementById('tick-slider');
      const ticks = document.querySelectorAll('.sp-tick');
      const now = document.getElementById('sp-now-marker');
      
      ticks.forEach(tick => tick.style.width = slider.value + 'px');
      now.style.width = slider.value + 'px';
    }

    function updateReset() {
      const slider = document.getElementById('reset-slider');
      const reset = document.getElementById('sp-reset-marker');
      reset.style.width = slider.value + 'px';
      reset.style.height = slider.value + 'px';
      reset.style.marginTop = (-slider.value/2) + 'px';
    }

    function updateTimes() {
      const workStart = document.getElementById('work-start-time').value;
      const workEnd = document.getElementById('work-end-time').value;
      const breakStart = document.getElementById('break-start-time').value;
      const breakEnd = document.getElementById('break-end-time').value;
      const nowTime = document.getElementById('now-time').value;
      const resetTime = document.getElementById('reset-time').value;

      // Converte hora para % (24h = 0-100%)
      const timeToPercent = (time) => {
        const [h, m] = time.split(':').map(Number);
        return ((h * 60 + m) / (24 * 60)) * 100;
      };

      const workStartPct = timeToPercent(workStart);
      const workEndPct = timeToPercent(workEnd);
      const breakStartPct = timeToPercent(breakStart);
      const breakEndPct = timeToPercent(breakEnd);
      const nowPct = timeToPercent(nowTime);
      const resetPct = timeToPercent(resetTime);

      const workShift = document.querySelector('.sp-work-shift');
      const spBreak = document.querySelector('.sp-break');
      const nowMarker = document.getElementById('sp-now-marker');
      const resetMarker = document.getElementById('sp-reset-marker');

      // Banda de trabalho (06:00 = 25%, 24:00 = 100%)
      const startHourPct = 25; // 06:00
      const endHourPct = 100; // 24:00
      
      const scalePos = (pct) => {
        return ((pct - 25) / 75) * 100;
      };

      // Posiciona banda de trabalho
      workShift.style.left = scalePos(workStartPct) + '%';
      workShift.style.width = ((workEndPct - workStartPct) / 75 * 100) + '%';
      
      // Posiciona banda de intervalo
      spBreak.style.left = scalePos(breakStartPct) + '%';
      spBreak.style.width = ((breakEndPct - breakStartPct) / 75 * 100) + '%';
      if (breakStartPct > breakEndPct) {
        spBreak.style.opacity = 0;
      } else {
        spBreak.style.opacity = 0.5;
      }
      
      // Marker atual
      nowMarker.style.left = scalePos(nowPct) + '%';
      
      // Label do horario atual
      const nowLabel = document.getElementById('now-time-label');
      nowLabel.textContent = nowTime;
      nowLabel.style.left = nowMarker.style.left;
      
      // Marker reset
      resetMarker.style.left = scalePos(resetPct) + '%';

      // Verifica se está fora do expediente
      const isOutOfHours = nowPct < workStartPct || nowPct > workEndPct;
      if (isOutOfHours) {
        nowMarker.classList.add('out-of-hours');
      } else {
        nowMarker.classList.remove('out-of-hours');
      }
    }

    // Gera marcas de hora na inicialização
    function initHourMarkers() {
      const container = document.getElementById('hour-markers');
      const hours = [6, 9, 12, 15, 18, 21, 24];
      
      container.innerHTML = '';
      hours.forEach(hour => {
        const marker = document.createElement('div');
        marker.className = 'sp-hour-marker';
        marker.style.left = ((hour - 6) / 18 * 100) + '%';
        marker.style.height = '100%';
        marker.setAttribute('data-hour', hour + ':00');
        container.appendChild(marker);
      });
    }

    // Inicializa
    initHourMarkers();
    updateTimes();

      // Atualiza labels
      document.getElementById('sp-timeline-start').textContent = workStart;
      document.getElementById('sp-timeline-end').textContent = workEnd;
    }
  </script>

</body>
</html>
